name: Build executables

# PyInstaller cannot cross-compile, so each platform is built on its own runner.
# Pushing a version tag (e.g. v0.1.0) builds all four binaries and publishes them
# as a GitHub Release. A manual run (workflow_dispatch) builds and uploads the
# per-OS zips as workflow artifacts for testing, without creating a Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04      # older glibc => runs on more Linux distros
            asset: rfnoise-linux-x86_64
            bin: rfnoise
          - os: windows-latest
            asset: rfnoise-windows-x86_64
            bin: rfnoise.exe
          - os: macos-13          # Intel
            asset: rfnoise-macos-x86_64
            bin: rfnoise
          - os: macos-14          # Apple Silicon
            asset: rfnoise-macos-arm64
            bin: rfnoise
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rfnoise (all extras) + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install ".[gui,dsp,hardware]" pyinstaller

      - name: Build onefile binary
        run: pyinstaller rfnoise.spec

      - name: Smoke-test the binary
        shell: bash
        run: ./dist/${{ matrix.bin }} list-devices

      - name: Package (zip) - Unix
        if: runner.os != 'Windows'
        run: cd dist && zip -j9 "../${{ matrix.asset }}.zip" "${{ matrix.bin }}"

      - name: Package (zip) - Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath "${{ matrix.asset }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the Release and upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
